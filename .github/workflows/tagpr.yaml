name: TAGPR

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  tagpr:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    outputs:
      tag: ${{ steps.tagpr.outputs.tag }}
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Wait for commit-PR association to be indexed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          for i in $(seq 1 30); do
            count=$(gh api "repos/${GH_REPO}/commits/${COMMIT_SHA}/pulls" --jq 'length')
            if [ "${count}" -gt 0 ]; then
              echo "commit ${COMMIT_SHA} is associated with ${count} PR(s)"
              exit 0
            fi
            echo "attempt ${i}: no PR association yet, sleeping 5s"
            sleep 5
          done
          echo "giving up after 30 attempts; proceeding anyway"
      - name: tagpr
        id: tagpr
        uses: Songmu/tagpr@9bbb945b2fb025126186661e27d55485e3fc6df6 # v1.18.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-app:
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.tagpr.outputs.tag }}
      - name: Generate token for homebrew-tap
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap
      - uses: ./.github/actions/release-app
        with:
          tag: ${{ needs.tagpr.outputs.tag }}
          homebrew_tap_token: ${{ steps.app-token.outputs.token }}
          tauri_signing_private_key: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          tauri_signing_private_key_password: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          apple_certificate: ${{ secrets.APPLE_CERTIFICATE }}
          apple_certificate_password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          apple_signing_identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          apple_id: ${{ secrets.APPLE_ID }}
          apple_password: ${{ secrets.APPLE_PASSWORD }}
          apple_team_id: ${{ secrets.APPLE_TEAM_ID }}
          keychain_password: ${{ secrets.KEYCHAIN_PASSWORD }}

  publish-release:
    needs: [tagpr, release-app]
    if: needs.tagpr.outputs.tag != ''
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit ${{ needs.tagpr.outputs.tag }} --draft=false
