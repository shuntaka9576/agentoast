[config]
default_to_workspace = false

# ---------------------------------------------------------------------------
# Setup
# ---------------------------------------------------------------------------
[tasks.setup]
description = "Install frontend dependencies"
command = "bun"
args = ["install"]

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
[tasks.build-app]
description = "Build Tauri app (includes CLI) in release mode"
command = "bun"
args = ["run", "tauri", "build"]

[tasks.build]
description = "Build Tauri app (includes CLI)"
dependencies = ["build-app"]

# ---------------------------------------------------------------------------
# Install
# ---------------------------------------------------------------------------
[tasks.stop-app]
description = "Stop running Agentoast app"
script = ["pkill -f 'Agentoast.app' || true"]

[tasks.install-app]
description = "Copy built .app to /Applications/"
script = [
  "pkill -f 'Agentoast.app' || true",
  "sleep 1",
  "rm -rf /Applications/Agentoast.app",
  "cp -r target/release/bundle/macos/Agentoast.app /Applications/",
  "/System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister -u /Applications/Agentoast.app || true",
  "/System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister /Applications/Agentoast.app",
  "/System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister -u target/release/bundle/macos/Agentoast.app || true",
  "rm -rf target/release/bundle/macos/Agentoast.app",
]

# For local development only. Homebrew Cask uses its own `binary` stanza
# to create a symlink in /opt/homebrew/bin/agentoast automatically.
# We use ~/.local/bin here because /usr/local/bin may require sudo.
[tasks.install-cli-symlink]
description = "Create CLI symlink to the installed .app binary"
script = [
  "mkdir -p ~/.local/bin && ln -sf /Applications/Agentoast.app/Contents/MacOS/agentoast ~/.local/bin/agentoast",
]

[tasks.install]
description = "Build and install app + CLI symlink"
dependencies = ["stop-app", "build"]
run_task = { name = ["install-app", "install-cli-symlink"], parallel = false }

# ---------------------------------------------------------------------------
# Uninstall
# ---------------------------------------------------------------------------
[tasks.uninstall]
description = "Stop app, remove .app from /Applications/, uninstall Cask/CLI, and remove config/data"
dependencies = ["stop-app"]
script = '''
rm -rf /Applications/Agentoast.app
rm -f ~/.local/bin/agentoast
rm -f /usr/local/bin/agentoast
/System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister -u target/release/bundle/macos/Agentoast.app 2>/dev/null || true
rm -rf target/release/bundle/macos/Agentoast.app
brew uninstall --cask agentoast 2>/dev/null || true
rm -rf ~/.config/agentoast
rm -rf ~/.local/share/agentoast
echo "Done! Uninstalled agentoast"
'''

# ---------------------------------------------------------------------------
# Dev
# ---------------------------------------------------------------------------
[tasks.dev]
description = "Start Tauri dev mode"
command = "bun"
args = ["run", "tauri", "dev"]

# ---------------------------------------------------------------------------
# Launch
# ---------------------------------------------------------------------------
[tasks.launch]
description = "Launch installed app"
command = "open"
args = ["/Applications/Agentoast.app"]

# ---------------------------------------------------------------------------
# Publish
# ---------------------------------------------------------------------------
[tasks.publish-app]
description = "Build DMG, upload to GitHub Release, and update Cask"
script = '''
VERSION=$(grep -m1 'version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
TAG="v${VERSION}"
DMG_NAME="Agentoast_${VERSION}_aarch64.dmg"

echo "Publishing Agentoast app ${TAG}..."

# 1. Build Tauri app
cargo make build-app

# 2. Upload DMG to GitHub Release
gh release upload "${TAG}" "target/release/bundle/dmg/${DMG_NAME}" --clobber

# 3. Update Cask via GitHub Contents API
SHA256=$(shasum -a 256 "target/release/bundle/dmg/${DMG_NAME}" | awk '{print $1}')
DMG_URL="https://github.com/shuntaka9576/agentoast/releases/download/${TAG}/${DMG_NAME}"

CASK_CONTENT=$(cat <<CASK_EOF
cask "agentoast" do
  version "${VERSION}"
  sha256 "${SHA256}"

  url "${DMG_URL}"
  name "Agentoast"
  desc "macOS menu bar notification app for AI coding agents"
  homepage "https://github.com/shuntaka9576/agentoast"

  auto_updates true
  app "Agentoast.app"
  binary "#{appdir}/Agentoast.app/Contents/MacOS/agentoast"

  zap trash: [
    "~/.local/share/agentoast",
    "~/.config/agentoast",
  ]
end
CASK_EOF
)

ENCODED=$(echo "${CASK_CONTENT}" | base64)
EXISTING_SHA=$(gh api repos/shuntaka9576/homebrew-tap/contents/Casks/agentoast.rb --jq '.sha' 2>/dev/null || echo "")

if [ -n "${EXISTING_SHA}" ]; then
  gh api repos/shuntaka9576/homebrew-tap/contents/Casks/agentoast.rb \
    --method PUT \
    -f message="Update agentoast cask to ${TAG}" \
    -f content="${ENCODED}" \
    -f sha="${EXISTING_SHA}"
else
  gh api repos/shuntaka9576/homebrew-tap/contents/Casks/agentoast.rb \
    --method PUT \
    -f message="Add agentoast cask ${TAG}" \
    -f content="${ENCODED}"
fi

# Upload updater artifacts (if available from signed build)
TAR_GZ="target/release/bundle/macos/Agentoast.app.tar.gz"
SIG_FILE="target/release/bundle/macos/Agentoast.app.tar.gz.sig"

if [ -f "${TAR_GZ}" ] && [ -f "${SIG_FILE}" ]; then
  gh release upload "${TAG}" "${TAR_GZ}" "${SIG_FILE}" --clobber

  SIGNATURE=$(cat "${SIG_FILE}")
  TAR_GZ_URL="https://github.com/shuntaka9576/agentoast/releases/download/${TAG}/Agentoast.app.tar.gz"

  cat > /tmp/latest.json <<EOF
{
  "version": "${VERSION}",
  "notes": "Release ${TAG}",
  "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
  "platforms": {
    "darwin-aarch64": {
      "signature": "${SIGNATURE}",
      "url": "${TAR_GZ_URL}"
    }
  }
}
EOF

  gh release upload "${TAG}" /tmp/latest.json --clobber
  rm /tmp/latest.json
  echo "Uploaded updater artifacts"
fi

echo "Done! Published ${TAG}"
'''

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------
[tasks.fmt-check]
description = "Check Rust formatting"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.clippy]
description = "Run clippy on workspace"
command = "cargo"
args = ["clippy", "--workspace", "--", "-D", "warnings"]

[tasks.lint-vp]
description = "Run vp lint"
command = "bun"
args = ["x", "vp", "lint", ".", "--deny-warnings"]

[tasks.fmt-check-vp]
description = "Run vp fmt check"
command = "bun"
args = ["x", "vp", "fmt", "--check"]

[tasks.spell-check]
description = "Run cspell"
command = "bun"
args = ["x", "cspell", "lint", ".", "--cache", "--gitignore"]

[tasks.lint]
description = "Run all linters (Rust + frontend)"
dependencies = ["fmt-check", "clippy", "fmt-check-vp", "lint-vp", "spell-check"]

# ---------------------------------------------------------------------------
# Infra (gh-infra)
# ---------------------------------------------------------------------------
[tasks.gh-validate]
description = "Validate GitHub repository config"
command = "gh"
args = ["infra", "validate", ".github/infra/"]

# ---------------------------------------------------------------------------
# Clean
# ---------------------------------------------------------------------------
[tasks.clean]
description = "Remove build artifacts"
script = ["cargo clean", "rm -rf dist"]
